title: IAM Access Key Created On Bedrock Phantom User
id: f8fe8f6d-d449-4d4a-a3d8-e136fc812362
status: stable
description: |
    Detects creation of an IAM access key (AKIA*) on a BedrockAPIKey-*
    phantom user: the canonical privilege-escalation pivot. The new
    credentials inherit AmazonBedrockLimitedAccess and persist after the
    originating Bedrock key is revoked.
references:
    - https://github.com/BeyondTrust/bedrock-keys-security#privilege-escalation
author: BeyondTrust Phantom Labs
date: 2026/04/27
tags:
    - attack.persistence
    - attack.privilege_escalation
    - attack.t1098.001
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: CreateAccessKey
        requestParameters.userName|startswith: 'BedrockAPIKey-'
    condition: selection
falsepositives:
    - Should be near-zero. There is no legitimate workflow that creates IAM
      access keys on phantom Bedrock users. Treat any hit as suspicious.
level: high
