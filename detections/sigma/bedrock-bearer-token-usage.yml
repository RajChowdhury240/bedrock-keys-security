title: Bedrock API Key Usage (callWithBearerToken Signal)
id: 795a4ee0-e66c-461f-936a-6d95cb505128
status: stable
description: |
    Primary detection signal for any Bedrock API key request. Every
    long-term and short-term Bedrock API key call records
    additionalEventData.callWithBearerToken = true in CloudTrail; standard
    SigV4-authenticated Bedrock requests do not. If this rule fires, a
    Bedrock API key (not a SigV4 credential) was used.
references:
    - https://github.com/BeyondTrust/bedrock-keys-security
    - https://docs.aws.amazon.com/bedrock/latest/userguide/logging-using-cloudtrail.html
author: BeyondTrust Phantom Labs
date: 2026/04/27
tags:
    - attack.credential_access
    - attack.t1078.004
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: bedrock.amazonaws.com
        additionalEventData.callWithBearerToken: true
    condition: selection
falsepositives:
    - Legitimate use of Bedrock API keys by sanctioned applications. Allowlist
      known principals or pair with source-IP allowlisting.
level: low
