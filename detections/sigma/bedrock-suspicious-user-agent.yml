title: Bedrock API Key Used With Suspicious User Agent
id: 3549eef7-7b40-4cc7-ac13-f18c1e0585bd
status: experimental
description: |
    Detects Bedrock API key usage from generic or scripted HTTP clients
    commonly observed in LLMjacking operations. Legitimate applications
    use AWS SDK user-agent strings; attackers running concurrent
    asynchronous requests at volume use python-requests, aiohttp or curl
    defaults.
references:
    - https://sysdig.com/blog/growing-dangers-of-llmjacking
    - https://github.com/BeyondTrust/bedrock-keys-security
author: BeyondTrust Phantom Labs
date: 2026/04/27
tags:
    - attack.impact
    - attack.t1496
logsource:
    product: aws
    service: cloudtrail
detection:
    bearer_token:
        eventSource: bedrock.amazonaws.com
        additionalEventData.callWithBearerToken: true
    suspicious_ua:
        userAgent|re: '(?i)(python-requests|aiohttp|curl/|httpx|axios|node-fetch)'
    condition: bearer_token and suspicious_ua
falsepositives:
    - Legitimate scripts and CI jobs using non-SDK HTTP clients. Allowlist
      by sourceIPAddress or principalId before alerting.
level: high
