title: Bedrock API Key Data-Plane Bearer Call (correlation base)
id: a344e18c-c8b6-4595-97c1-0dd88e1d13d4
name: bedrock_bearer_data_plane_call
status: stable
description: |
    Internal base rule for the cross-region correlation. Matches any
    InvokeModel-family call authenticated by a Bedrock API key (long-term
    or short-term), anchored on additionalEventData.callWithBearerToken =
    true so it works for both key types regardless of userIdentity.userName
    shape (short-term keys do NOT use BedrockAPIKey-* usernames).
references:
    - https://github.com/BeyondTrust/bedrock-keys-security
author: BeyondTrust Phantom Labs
date: 2026/04/27
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: bedrock.amazonaws.com
        eventName:
            - InvokeModel
            - InvokeModelWithResponseStream
            - Converse
            - ConverseStream
            - CallWithBearerToken
        additionalEventData.callWithBearerToken: true
    condition: selection
level: informational
