title: Bedrock API Key Data-Plane Bearer Call (correlation base)
id: a344e18c-c8b6-4595-97c1-0dd88e1d13d4
name: bedrock_bearer_data_plane_call
status: stable
description: |
    Base rule for the cross-region correlation. Matches any
    InvokeModel-family call authenticated by a Bedrock API key (long-term
    or short-term), anchored on additionalEventData.callWithBearerToken so
    it works for both key types regardless of userName shape.
references:
    - https://github.com/BeyondTrust/bedrock-keys-security
author: BeyondTrust Phantom Labs
date: 2026/04/27
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: bedrock.amazonaws.com
        eventName:
            - InvokeModel
            - InvokeModelWithResponseStream
            - Converse
            - ConverseStream
            - CallWithBearerToken
        additionalEventData.callWithBearerToken: true
    condition: selection
level: informational
---
title: Bedrock Bearer Token Used Across Multiple Regions
id: eb006603-5e96-427b-9d03-e6442f203308
status: experimental
description: |
    Detects the same Bedrock bearer principal issuing data-plane calls
    across two or more AWS regions within 30 minutes. Canonical LLMjacking
    fan-out pattern: stolen keys spun up across regions to maximize
    foundation-model throughput. Aggregates by userIdentity.principalId so
    both long-term keys (phantom users) and short-term keys (STS-derived,
    no BedrockAPIKey-* userName) are caught.
references:
    - https://github.com/BeyondTrust/bedrock-keys-security#llmjacking
author: BeyondTrust Phantom Labs
date: 2026/04/27
tags:
    - attack.impact
    - attack.t1496
correlation:
    type: value_count
    rules:
        - bedrock_bearer_data_plane_call
    group-by:
        - userIdentity.principalId
    timespan: 30m
    condition:
        field: awsRegion
        gte: 2
falsepositives:
    - Legitimate multi-region deployments. Allowlist known production
      principals or scope by tag.
level: high
