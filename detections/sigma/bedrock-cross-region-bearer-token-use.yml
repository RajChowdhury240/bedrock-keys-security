title: Bedrock Bearer Token Used Across Multiple Regions
id: eb006603-5e96-427b-9d03-e6442f203308
status: experimental
description: |
    Detects the same Bedrock bearer principal issuing data-plane calls
    across two or more AWS regions within 30 minutes. This is the
    canonical LLMjacking fan-out pattern: stolen keys are spun up across
    regions to maximize foundation model throughput before detection.

    Anchored on additionalEventData.callWithBearerToken (the universal
    signal for any Bedrock API key request), so this catches both
    long-term keys (phantom users) and short-term keys (STS-derived
    bearer tokens whose userName is the assumed role / session name,
    not BedrockAPIKey-*). Aggregating by userIdentity.principalId (not
    userName) is what makes short-term keys visible.

    Modelled as a Sigma 2.x correlation (value_count). Backends that
    support correlations (Splunk, Elastic Lucene, ESQL, Sentinel KQL)
    will emit aggregation queries; legacy backends without correlation
    support will need the original pipe-style fallback.
references:
    - https://github.com/BeyondTrust/bedrock-keys-security#llmjacking
author: BeyondTrust Phantom Labs
date: 2026/04/27
tags:
    - attack.impact
    - attack.t1496
correlation:
    type: value_count
    rules:
        - bedrock_bearer_data_plane_call
    group-by:
        - userIdentity.principalId
    timespan: 30m
    condition:
        field: awsRegion
        gte: 2
falsepositives:
    - Legitimate multi-region deployments. Allowlist known production
      principals or scope by tag.
level: high
