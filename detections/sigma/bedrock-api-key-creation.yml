title: AWS Bedrock Long-Term API Key Created
id: 65b08c42-6ce2-4803-9ac2-ba6fdb90a564
status: stable
description: |
    Detects creation of a Bedrock service-specific credential (a long-term
    ABSK API key). Console-triggered creates emit a silent three-event
    sequence (CreateUser, AttachUserPolicy, CreateServiceSpecificCredential)
    that provisions a BedrockAPIKey-<id> phantom IAM user with
    AmazonBedrockLimitedAccess. CLI/SDK creates on an existing user emit
    only this event; secondary keys on the same phantom (the +1 pattern)
    are also captured.
references:
    - https://docs.aws.amazon.com/bedrock/latest/userguide/api-keys.html
    - https://github.com/BeyondTrust/bedrock-keys-security
author: BeyondTrust Phantom Labs
date: 2026/04/27
tags:
    - attack.credential_access
    - attack.t1098.001
logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: iam.amazonaws.com
        eventName: CreateServiceSpecificCredential
        requestParameters.serviceName: bedrock.amazonaws.com
    condition: selection
falsepositives:
    - Legitimate developer onboarding to Bedrock when API keys are sanctioned.
      Pair with allowlist of expected principals (CI roles, dev IAM users).
level: medium
